<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; padding: 50px 20px; color: white; }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 1100px;
            margin: auto;
            color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 30px; text-align: left; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        
        th { 
            text-align: left; 
            padding: 15px; 
            color: #94a3b8; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        td { background: #f8fafc; padding: 15px; }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        .input-score {
            width: 50px;
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            color: #2563eb;
            outline: none;
        }

        .input-score:focus { border-color: #2563eb; }

        .btn-save {
            background: #2563eb;
            color: white;
            padding: 15px 30px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover { background: #1d4ed8; transform: scale(1.05); }
        
        .back-link { text-decoration: none; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Comunicación</h1>
            <a href="index.html" class="back-link">← Panel Central</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Estudiante</th>
                    <th>C1</th>
                    <th>C2</th>
                    <th>C3</th>
                    <th>Final</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>01</td>
                    <td style="font-weight: 600;">Castro Cornejo Ryder Dan</td>
                    <td><input type="number" class="input-score" value="16"></td>
                    <td><input type="number" class="input-score" value="18"></td>
                    <td><input type="number" class="input-score" value="15"></td>
                    <td style="font-weight: 800; color: #2563eb;">16.3</td>
                </tr>
            </tbody>
        </table>

        <div style="margin-top: 30px; text-align: right;">
            <button class="btn-save">Guardar Cambios</button>
        </div>
    </div>

</body>
</html>
