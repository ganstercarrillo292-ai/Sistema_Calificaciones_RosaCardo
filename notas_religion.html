<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Notas - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0F172A; /* Fondo oscuro profundo */
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 40px 20px;
        }

        h1 { color: white; text-align: center; font-weight: 800; margin-bottom: 40px; font-size: 2.5rem; }

        .table-container {
            background: white;
            max-width: 1100px;
            margin: auto;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            color: #64748b; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            padding: 15px; 
            border-bottom: 2px solid #F1F5F9;
            text-align: center;
        }

        td { padding: 15px; border-bottom: 1px solid #F1F5F9; text-align: center; }

        .input-text { 
            border: 1px solid #E2E8F0; 
            padding: 10px; 
            border-radius: 8px; 
            width: 90%; 
            background: #F8FAFC;
        }

        .n-input { 
            width: 50px; 
            text-align: center; 
            font-weight: 800; 
            color: #1E3A8A; 
            border: 1px solid #CBD5E1;
            padding: 8px;
            border-radius: 6px;
        }

        .promedio { font-weight: 800; color: #1E3A8A; font-size: 1.1rem; }

        .btn-group { display: flex; justify-content: space-between; margin-top: 30px; }
        
        .btn { 
            padding: 12px 25px; 
            border-radius: 12px; 
            font-weight: 700; 
            text-decoration: none; 
            cursor: pointer; 
            border: none;
        }

        .btn-back { background: #F1F5F9; color: #475569; }
        .btn-save { background: #2563EB; color: white; }
    </style>
</head>
<body>

    <h1>Rosa Cardó Digital</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>N°</th>
                    <th>DNI</th>
                    <th>Alumno</th>
                    <th>C1</th>
                    <th>C2</th>
                    <th>C3</th>
                    <th>PROM</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><input type="text" class="input-text" value="75160066"></td>
                    <td><input type="text" class="input-text" value="Castro Cornejo Ryder Dan"></td>
                    <td><input type="number" class="n-input" value="16"></td>
                    <td><input type="number" class="n-input" value="18"></td>
                    <td><input type="number" class="n-input" value="15"></td>
                    <td class="promedio">16</td>
                </tr>
                </tbody>
        </table>

        <div class="btn-group">
            <a href="index.html" class="btn btn-back">← Volver al Panel</a>
            <button class="btn btn-save">Sincronizar Datos</button>
        </div>
    </div>

</body>
</html>
