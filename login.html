<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #00338d 0%, #001a4d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: #00338d;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 800;
        }

        h2 { color: #1b2559; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #707eae; margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; color: #1b2559; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e0e5f2;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: #00338d; background: #f8faff; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #00338d;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,51,141,0.2); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-circle">RC</div>
    <h2>Bienvenido</h2>
    <p>Ingresa al Sistema Académico Rosa Cardó</p>
    
    <div class="input-group">
        <label>Usuario</label>
        <input type="text" id="user" placeholder="Ej: docente2026">
    </div>
    
    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="pass" placeholder="••••••••">
    </div>
    
    <button class="btn-login" onclick="entrar()">Iniciar Sesión</button>
</div>

<script>
    function entrar() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        // Cambia esto por tu lógica de acceso real
        if(u === "admin" && p === "1234") {
            window.location.href = "panel.html"; 
        } else {
            alert("Credenciales incorrectas");
        }
    }
</script>

</body>
</html>
