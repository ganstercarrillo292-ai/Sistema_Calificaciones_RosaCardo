<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Notas - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;   /* Azul vibrante para resaltar */
            --dark-bg: #0F172A;  /* El fondo oscuro que te gustaba */
            --white-card: #FFFFFF; /* El cuadro de la tabla ahora es blanco */
        }

        body { 
            background-color: var(--dark-bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            color: white; /* Texto general en blanco */
        }

        header h1 { 
            text-align: center; 
            font-weight: 800; 
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: white;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.5);
        }

        /* ESTO ES LO QUE CAMBIAMOS: El cuadro ahora es blanco */
        .container { 
            background: var(--white-card); 
            max-width: 1050px; 
            margin: auto; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #1F2937; /* Texto dentro del cuadro en color oscuro para leer bien */
        }

        .table-res { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; }
        
        thead th { 
            background: #F3F4F6; 
            color: #6B7280; 
            padding: 15px; 
            font-size: 0.75rem; 
            text-transform: uppercase;
            border-bottom: 2px solid #E5E7EB;
        }

        td { 
            padding: 12px; 
            border-bottom: 1px solid #F3F4F6; 
            text-align: center;
        }

        /* Inputs claros para que combinen */
        .editable-input { 
            border: 1px solid #D1D5DB; 
            padding: 8px 12px; 
            border-radius: 8px; 
            width: 90%; 
            font-size: 0.9rem;
            background: #F9FAFB;
            color: #111827;
        }

        .n-input { 
            width: 45px; 
            text-align: center; 
            font-weight: 800; 
            color: #1E3A8A;
        }

        .avg { font-weight: 800; font-size: 1.1rem; color: #1E3A8A; }

        /* Botones */
        .btn-group { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { 
            padding: 12px 25px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none;
            transition: 0.3s;
            border: none;
        }
        .btn-save { background: #2563EB; color: white; }
        .btn-save:hover { background: #1D4ED8; transform: translateY(-2px); }
        .btn-back { background: #F3F4F6; color: #4B5563; }
    </style>
</head>
<body>
    <header>
        <h1>Rosa Cardó Digital</h1>
    </header>

    <div class="container">
        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>DNI</th>
                        <th>Alumno</th>
                        <th>C1</th>
                        <th>C2</th>
                        <th>C3</th>
                        <th>Prom</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><input type="text" class="editable-input" value="75160066"></td>
                        <td><input type="text" class="editable-input" value="Castro Cornejo Ryder Dan"></td>
                        <td><input type="number" class="editable-input n-input" value="16"></td>
                        <td><input type="number" class="editable-input n-input" value="18"></td>
                        <td><input type="number" class="editable-input n-input" value="15"></td>
                        <td class="avg">16</td>
                    </tr>
                    </tbody>
            </table>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-back">← Volver al Panel</a>
            <button class="btn btn-save">Sincronizar Datos</button>
        </div>
    </div>
</body>
</html>
