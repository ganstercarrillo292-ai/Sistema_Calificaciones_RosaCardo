<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rosa Cardó Digital - Notas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0F172A; 
            font-family: 'Inter', sans-serif; 
            padding: 40px 20px; 
            margin: 0;
        }
        h1 { color: white; text-align: center; font-weight: 800; margin-bottom: 30px; font-size: 2.2rem; }
        
        .container { 
            background: white; 
            max-width: 1000px; 
            margin: auto; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        thead th { 
            background: #F8FAFC; 
            color: #64748B; 
            padding: 15px; 
            font-size: 0.75rem; 
            text-transform: uppercase;
            border-bottom: 2px solid #E2E8F0;
        }
        td { padding: 12px; border-bottom: 1px solid #F1F5F9; text-align: center; color: #1E293B; }

        .editable-input { 
            border: 1px solid #D1D5DB; 
            padding: 8px; 
            border-radius: 8px; 
            width: 90%; 
            background: #F9FAFB;
            font-family: 'Inter', sans-serif;
        }
        .n-input { width: 50px; text-align: center; font-weight: 800; color: #1E3A8A; }
        .avg { font-weight: 800; color: #1E3A8A; font-size: 1.1rem; }

        .footer-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; border: none; transition: 0.3s; }
        .btn-back { background: #F1F5F9; color: #475569; }
        .btn-save { background: #2563EB; color: white; }
        .btn-save:hover { background: #1D4ED8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h1>Rosa Cardó Digital</h1>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>N°</th>
                    <th>DNI</th>
                    <th>Alumno</th>
                    <th>C1</th>
                    <th>C2</th>
                    <th>C3</th>
                    <th>PROM</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><input type="text" class="editable-input" value="75160066"></td>
                    <td><input type="text" class="editable-input" value="Castro Cornejo Ryder Dan"></td>
                    <td><input type="number" class="editable-input n-input" value="16"></td>
                    <td><input type="number" class="editable-input n-input" value="18"></td>
                    <td><input type="number" class="editable-input n-input" value="15"></td>
                    <td class="avg">16</td>
                </tr>
            </tbody>
        </table>
        <div class="footer-btns">
            <a href="index.html" class="btn btn-back">← Volver al Panel</a>
            <button class="btn btn-save">Sincronizar Datos</button>
        </div>
    </div>
</body>
</html>
