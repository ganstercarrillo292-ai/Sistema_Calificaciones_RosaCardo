<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1E3A8A;
            --bg-dark: #0F172A; /* El fondo oscuro de tu imagen */
        }

        body { 
            background-color: var(--bg-dark); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* LA TARJETA BLANCA DE TU IMAGEN */
        .main-card {
            background: white;
            width: 90%;
            max-width: 950px;
            padding: 60px 20px;
            border-radius: 50px; /* Bordes muy circulares */
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-info {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .logout { color: #EF4444; text-decoration: none; margin-left: 5px; }

        h1 { 
            color: var(--primary-blue); 
            font-weight: 800; 
            font-size: 2.5rem;
            margin: 5px 0;
        }

        .welcome {
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        /* GRID DE BOTONES CUADRADOS */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas como en tu foto */
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        .course-btn {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 25px 10px;
            border-radius: 15px;
            text-decoration: none;
            color: #1E293B;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            flex-direction: row; /* Icono al lado del texto */
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .course-btn:hover {
            background: #F1F5F9;
            transform: translateY(-3px);
            border-color: var(--primary-blue);
        }

        .icon { font-size: 1.1rem; }

        /* Ajuste para tablets/celulares */
        @media (max-width: 768px) {
            .courses-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header-info">
            Panel Administrativo - Mallares <a href="#" class="logout">Cerrar Sesión ×</a>
        </div>
        <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
        <p class="welcome">"BIENVENIDOS"</p>
        
        <div class="courses-grid">
            <a href="notas_matematica.html" class="course-btn"><span class="icon">➕</span> Matemática</a>
            <a href="notas_comunicacion.html" class="course-btn"><span class="icon">📖</span> Comunicación</a>
            <a href="notas_religion.html" class="course-btn"><span class="icon">⛪</span> Religión</a>
            <a href="notas_ciencia.html" class="course-btn"><span class="icon">🔬</span> Ciencia</a>
            <a href="notas_dpcc.html" class="course-btn"><span class="icon">⚖️</span> D.P.C.C</a>
            <a href="notas_efisica.html" class="course-btn"><span class="icon">⚽</span> E. Física</a>
            <a href="notas_ept.html" class="course-btn"><span class="icon">💻</span> E.P.T</a>
            <a href="notas_sociales.html" class="course-btn"><span class="icon">🌎</span> Sociales</a>
            <a href="notas_arte.html" class="course-btn"><span class="icon">🎨</span> Arte</a>
            <a href="notas_ingles.html" class="course-btn">abc Inglés</a>
            <a href="notas_tutoria.html" class="course-btn"><span class="icon">🤝</span> Tutoría</a>
        </div>
    </div>
</body>
</html>
