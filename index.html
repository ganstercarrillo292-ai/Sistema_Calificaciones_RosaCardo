<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo | Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; /* Azul institucional */
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; color: var(--text);
        }

        /* Navbar corregida sin nombres externos */
        nav {
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .panel-info { font-weight: 700; color: #64748b; font-size: 0.85rem; }
        .logout { color: #ef4444; text-decoration: none; font-weight: 700; }

        .hero { text-align: center; padding: 50px 20px; }
        h1 { font-size: 2.3rem; font-weight: 800; color: var(--primary); margin: 0; }
        .school-subtitle { color: #64748b; font-weight: 600; margin-top: 5px; display: block; }

        /* Grid de Cursos */
        .grid-container {
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: white;
            padding: 30px 15px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .icon {
            font-size: 1.6rem;
            margin-bottom: 12px;
            background: #f1f5f9;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
        }

        .course-name { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav>
    <div class="panel-info">PORTAL EDUCATIVO • MALLARES</div>
    <a href="#" class="logout">Cerrar Sesión ×</a>
</nav>

<div class="hero">
    <h1>Sistema de Calificaciones</h1>
    <span class="school-subtitle">I.E. ROSA CARDÓ DE GUARDERAS</span>
</div>

<div class="grid-container">
    <a href="notas_matematica.html" class="course-card"><div class="icon">➕</div><div class="course-name">Matemática</div></a>
    <a href="notas_comunicacion.html" class="course-card"><div class="icon">📖</div><div class="course-name">Comunicación</div></a>
    <a href="notas_religion.html" class="course-card"><div class="icon">⛪</div><div class="course-name">Religión</div></a>
    <a href="notas_ciencia.html" class="course-card"><div class="icon">🔬</div><div class="course-name">Ciencia</div></a>
    <a href="notas_dpcc.html" class="course-card"><div class="icon">⚖️</div><div class="course-name">D.P.C.C</div></a>
    <a href="notas_efisica.html" class="course-card"><div class="icon">⚽</div><div class="course-name">E. Física</div></a>
    <a href="notas_ept.html" class="course-card"><div class="icon">💻</div><div class="course-name">E.P.T</div></a>
    <a href="notas_sociales.html" class="course-card"><div class="icon">🌎</div><div class="course-name">Sociales</div></a>
    <a href="notas_arte.html" class="course-card"><div class="icon">🎨</div><div class="course-name">Arte</div></a>
    <a href="notas_ingles.html" class="course-card"><div class="icon">abc</div><div class="course-name">Inglés</div></a>
    <a href="notas_tutoria.html" class="course-card"><div class="icon">🤝</div><div class="course-name">Tutoría</div></a>
</div>

</body>
</html>
