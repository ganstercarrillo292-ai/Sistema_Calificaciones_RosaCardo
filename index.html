<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ESTILO GLOBAL: Fondo oscuro profundo */
        body { 
            background-color: #0F172A; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* TARJETA PRINCIPAL: Blanca y muy redondeada */
        .main-card {
            background: white;
            width: 90%;
            max-width: 900px;
            padding: 50px 30px;
            border-radius: 50px; /* Bordes circulares como en tu foto */
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .admin-info {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .logout { color: #EF4444; text-decoration: none; margin-left: 5px; }

        h1 { 
            color: #1E3A8A; 
            font-weight: 800; 
            font-size: 2.3rem;
            margin: 10px 0;
        }

        .welcome {
            font-size: 0.9rem;
            color: #64748b;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        /* CUADRÍCULA DE CURSOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 850px;
            margin: auto;
        }

        .btn-curso {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #1E293B;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-curso:hover {
            background: #F1F5F9;
            transform: translateY(-3px);
            border-color: #1E3A8A;
        }

        .icon { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="admin-info">
            Panel Administrativo - Mallares <a href="#" class="logout">Cerrar Sesión ×</a>
        </div>
        <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
        <p class="welcome">"BIENVENIDOS"</p>
        
        <div class="grid">
            <a href="notas_matematica.html" class="btn-curso">➕ Matemática</a>
            <a href="notas_comunicacion.html" class="btn-curso">📖 Comunicación</a>
            <a href="notas_religion.html" class="btn-curso">⛪ Religión</a>
            <a href="notas_ciencia.html" class="btn-curso">🔬 Ciencia</a>
            <a href="notas_dpcc.html" class="btn-curso">⚖️ D.P.C.C</a>
            <a href="notas_efisica.html" class="btn-curso">⚽ E. Física</a>
            <a href="notas_ept.html" class="btn-curso">💻 E.P.T</a>
            <a href="notas_sociales.html" class="btn-curso">🌎 Sociales</a>
            <a href="notas_arte.html" class="btn-curso">🎨 Arte</a>
            <a href="notas_ingles.html" class="btn-curso">abc Inglés</a>
            <a href="notas_tutoria.html" class="btn-curso">🤝 Tutoría</a>
        </div>
    </div>
</body>
</html>
