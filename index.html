<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            color: var(--text-main);
        }

        /* Header Estilo Apple */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-tag { font-weight: 600; font-size: 0.85rem; color: #64748b; }
        .logout { color: #ef4444; text-decoration: none; font-weight: 700; margin-left: 15px; }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; color: #0f172a; }
        .subtitle { color: #64748b; font-size: 1.1rem; margin-bottom: 50px; }

        /* Grid de Cursos Mejorado */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .course-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: #eff6ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="user-tag">Panel Administrativo • Mallares</div>
        <a href="#" class="logout">Cerrar Sesión</a>
    </header>

    <div class="container">
        <h1>Portal Educativo</h1>
        <p class="subtitle">I.E. Rosa Cardó de Guarderas</p>
        
        <div class="grid">
            <a href="notas_matematica.html" class="course-card">
                <div class="icon-circle">∑</div>
                Matemática
            </a>
            <a href="notas_comunicacion.html" class="course-card">
                <div class="icon-circle">📖</div>
                Comunicación
            </a>
            <a href="notas_religion.html" class="course-card">
                <div class="icon-circle">⛪</div>
                Religión
            </a>
            <a href="notas_ciencia.html" class="course-card">
                <div class="icon-circle">🔬</div>
                Ciencia
            </a>
            <a href="notas_dpcc.html" class="course-card">
                <div class="icon-circle">⚖️</div>
                D.P.C.C
            </a>
            <a href="notas_efisica.html" class="course-card">
                <div class="icon-circle">⚽</div>
                E. Física
            </a>
        </div>
    </div>
</body>
</html>
