<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A8A;
            --bg: #F3F4F6;
            --text: #1F2937;
        }
        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .main-card {
            background: white;
            width: 90%;
            max-width: 850px;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .admin-tag {
            color: #6B7280;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }
        .logout { color: #EF4444; text-decoration: none; margin-left: 10px; }
        h1 { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 2.2rem;
            margin: 10px 0; 
        }
        .welcome-text {
            font-size: 1.2rem;
            color: #4B5563;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        .course-card {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .course-card:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(30, 58, 138, 0.2);
        }
    </style>
</head>
<body>
    <div class="main-card">
        <span class="admin-tag">Panel Administrativo - Mallares <a href="#" class="logout">Cerrar Sesión ×</a></span>
        <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
        <p class="welcome-text">"BIENVENIDOS"</p>
        
        <div class="courses-grid">
            <a href="notas_matematica.html" class="course-card">➕ Matemática</a>
            <a href="notas_comunicacion.html" class="course-card">📖 Comunicación</a>
            <a href="notas_religion.html" class="course-card">⛪ Religión</a>
            <a href="notas_ciencia.html" class="course-card">🔬 Ciencia</a>
            <a href="notas_dpcc.html" class="course-card">⚖️ D.P.C.C</a>
            <a href="notas_efisica.html" class="course-card">⚽ E. Física</a>
            <a href="notas_ept.html" class="course-card">💻 E.P.T</a>
            <a href="notas_sociales.html" class="course-card">🌎 Sociales</a>
            <a href="notas_arte.html" class="course-card">🎨 Arte</a>
            <a href="notas_ingles.html" class="course-card">abc Inglés</a>
            <a href="notas_tutoria.html" class="course-card">🤝 Tutoría</a>
        </div>
    </div>
</body>
</html>
