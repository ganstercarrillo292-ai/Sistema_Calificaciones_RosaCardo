<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A8A;
            --dark-bg: #0F172A; /* El azul oscuro de fondo que elegiste */
        }
        body { 
            background-color: var(--dark-bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .main-card {
            background: white;
            width: 90%;
            max-width: 850px;
            padding: 50px;
            border-radius: 30px; /* Bordes redondeados como en tu captura */
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .admin-tag { color: #64748b; font-weight: 600; font-size: 0.85rem; margin-bottom: 15px; display: block; }
        .logout { color: #EF4444; text-decoration: none; }
        h1 { color: var(--primary); font-weight: 800; font-size: 2.1rem; margin: 0; }
        .welcome-text { font-size: 0.9rem; color: #64748b; margin: 10px 0 40px 0; font-weight: 600; letter-spacing: 2px; }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .course-card {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            transition: all 0.2s;
        }
        .course-card:hover { background: #F1F5F9; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="main-card">
        <span class="admin-tag">Panel Administrativo - Mallares <a href="#" class="logout">Cerrar Sesión ×</a></span>
        <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
        <p class="welcome-text">"BIENVENIDOS"</p>
        <div class="courses-grid">
            <a href="notas_matematica.html" class="course-card">➕ Matemática</a>
            <a href="notas_comunicacion.html" class="course-card">📖 Comunicación</a>
            <a href="notas_religion.html" class="course-card">⛪ Religión</a>
            <a href="notas_ciencia.html" class="course-card">🔬 Ciencia</a>
            <a href="notas_dpcc.html" class="course-card">⚖️ D.P.C.C</a>
            <a href="notas_efisica.html" class="course-card">⚽ E. Física</a>
            <a href="notas_ept.html" class="course-card">💻 E.P.T</a>
            <a href="notas_sociales.html" class="course-card">🌎 Sociales</a>
            <a href="notas_arte.html" class="course-card">🎨 Arte</a>
            <a href="notas_ingles.html" class="course-card">abc Inglés</a>
            <a href="notas_tutoria.html" class="course-card">🤝 Tutoría</a>
        </div>
    </div>
</body>
</html>
