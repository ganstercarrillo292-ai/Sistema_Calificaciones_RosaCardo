<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003399; /* El azul fuerte de los bordes */
            --sky-bg: #DDEEFC;      /* El azul clarito de fondo que querías */
        }

        body { 
            background-color: var(--sky-bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Barra superior azul */
        .top-bar {
            background-color: #003399;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* La gran tarjeta blanca redondeada */
        .white-card {
            background: white;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 { 
            color: #003399; 
            font-size: 2rem; 
            margin-bottom: 5px;
        }

        .welcome {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }

        /* Los botones estilo cuadros de tu imagen */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .course-box {
            border: 2px solid var(--primary-blue);
            background: white;
            border-radius: 15px;
            padding: 25px 10px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .course-box:hover {
            background: #f0f7ff;
            transform: scale(1.03);
        }

        .icon { font-size: 1.2rem; color: #6366f1; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>Panel Administrativo - Mallares</span>
        <span>Cerrar Sesión X</span>
    </div>

    <div class="main-container">
        <div class="white-card">
            <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
            <p class="welcome">"BIENVENIDOS"</p>
            
            <div class="courses-grid">
                <a href="notas_matematica.html" class="course-box"><span class="icon">➕</span>Matemática</a>
                <a href="notas_comunicacion.html" class="course-box"><span class="icon">📖</span>Comunicación</a>
                <a href="notas_religion.html" class="course-box"><span class="icon">⛪</span>Religión</a>
                <a href="notas_ciencia.html" class="course-box"><span class="icon">🔬</span>Ciencia</a>
                <a href="notas_dpcc.html" class="course-card course-box"><span class="icon">⚖️</span>D.P.C.C</a>
                <a href="notas_efisica.html" class="course-box"><span class="icon">⚽</span>E. Física</a>
                <a href="notas_ept.html" class="course-box"><span class="icon">💻</span>E.P.T</a>
                <a href="notas_sociales.html" class="course-box"><span class="icon">🌎</span>Sociales</a>
                <a href="notas_arte.html" class="course-box"><span class="icon">🎨</span>Arte</a>
                <a href="notas_ingles.html" class="course-box"><span class="icon">abc</span>Inglés</a>
                <a href="notas_tutoria.html" class="course-box"><span class="icon">🤝</span>Tutoría</a>
            </div>
        </div>
    </div>
</body>
</html>
