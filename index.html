<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Educativo - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003399; /* Azul marino de la barra */
            --sky-bg: #DDEEFC;      /* Fondo celeste claro */
        }

        body { 
            background-color: var(--sky-bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Barra superior azul */
        .top-bar {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Tarjeta blanca central */
        .white-card {
            background: white;
            width: 100%;
            max-width: 950px;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { 
            color: var(--primary-blue); 
            font-size: 2.2rem; 
            font-weight: 800;
            margin-bottom: 5px;
        }

        .welcome {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: #333;
        }

        /* Grid de botones (Fichas con borde azul) */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .course-box {
            border: 2px solid var(--primary-blue);
            background: white;
            border-radius: 15px;
            padding: 25px 10px;
            text-decoration: none;
            color: #003399;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .course-box:hover {
            background: #f0f7ff;
            transform: scale(1.02);
        }

        .logout-link { color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>Panel Administrativo - Mallares</span>
        <a href="#" class="logout-link">Cerrar Sesión X</a>
    </div>

    <div class="main-container">
        <div class="white-card">
            <h1>Portal Educativo "Rosa Cardó de Guarderas"</h1>
            <p class="welcome">"BIENVENIDOS"</p>
            
            <div class="courses-grid">
                <a href="notas_matematica.html" class="course-box">➕<br>Matemática</a>
                <a href="notas_comunicacion.html" class="course-box">📖<br>Comunicación</a>
                <a href="notas_religion.html" class="course-box">⛪<br>Religión</a>
                <a href="notas_ciencia.html" class="course-box">🔬<br>Ciencia</a>
                <a href="notas_dpcc.html" class="course-box">⚖️<br>D.P.C.C</a>
                <a href="notas_efisica.html" class="course-box">⚽<br>E. Física</a>
                <a href="notas_ept.html" class="course-box">💻<br>E.P.T</a>
                <a href="notas_sociales.html" class="course-box">🌎<br>Sociales</a>
                <a href="notas_arte.html" class="course-box">🎨<br>Arte</a>
                <a href="notas_ingles.html" class="course-box">abc<br>Inglés</a>
                <a href="notas_tutoria.html" class="course-box">🤝<br>Tutoría</a>
            </div>
        </div>
    </div>
</body>
</html>
