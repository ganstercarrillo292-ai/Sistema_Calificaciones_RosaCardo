<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Notas - Rosa Cardó</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A8A;
            --bg: #F3F4F6;
            --white: #FFFFFF;
            --border: #E5E7EB;
        }
        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
        }
        /* CUADRO PRINCIPAL CLARO */
        .container { 
            background: var(--white); 
            max-width: 1000px; 
            margin: auto; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }
        header h1 { 
            color: var(--primary); 
            text-align: center; 
            font-weight: 800; 
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .table-res { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        
        thead th { 
            background: #F8FAF7; 
            color: #6B7280; 
            padding: 15px; 
            font-size: 0.75rem; 
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid #F3F4F6; 
            text-align: center;
        }
        /* Inputs estilizados */
        .editable-input { 
            border: 1px solid #D1D5DB; 
            padding: 8px 12px; 
            border-radius: 8px; 
            width: 90%; 
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .editable-input:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); 
        }
        .n-input { 
            width: 45px; 
            text-align: center; 
            font-weight: 800; 
            color: var(--primary);
        }
        .avg { font-weight: 800; font-size: 1.1rem; color: var(--primary); }

        /* Botones finales */
        .btn-group { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { 
            padding: 12px 25px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none;
            transition: 0.3s;
            border: none;
        }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #1E40AF; transform: scale(1.05); }
        .btn-back { background: #E5E7EB; color: #374151; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Rosa Cardó Digital</h1>
        </header>
        
        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>DNI</th>
                        <th>Alumno</th>
                        <th>C1</th>
                        <th>C2</th>
                        <th>C3</th>
                        <th>Prom</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo">
                    <tr>
                        <td>1</td>
                        <td><input type="text" class="editable-input" value="75160066"></td>
                        <td><input type="text" class="editable-input" value="Castro Cornejo Ryder Dan"></td>
                        <td><input type="number" class="editable-input n-input" value="16"></td>
                        <td><input type="number" class="editable-input n-input" value="18"></td>
                        <td><input type="number" class="editable-input n-input" value="15"></td>
                        <td class="avg">16</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-back">← Volver al Panel</a>
            <button class="btn btn-save">Sincronizar con Supabase</button>
        </div>
    </div>
</body>
</html>
